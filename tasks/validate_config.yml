---
- name: (Deprecation) Catch and report renamed settings
  ansible.builtin.fail:
    msg: >-
      Your configuration contains a variable, which now has a different name.
      Please change your configuration to rename the variable (`{{ item.old }}` -> `{{ item.new }}`).
  when: "lookup('ansible.builtin.varnames', ('^' + item.old + '$'), wantlist=True) | length > 0"
  with_items:
    - "old": "promtail_basic_auth_enabled"
      "new": "<superseded by promtail_container_labels_traefik_api_traefik_middleware_basic_auth_enabled and promtail_container_labels_metrics_traefik_middleware_basic_auth_enabled>"
    - "old": "promtail_basic_auth_username"
      "new": "<superseded by promtail_container_labels_traefik_api_traefik_middleware_basic_auth_users or promtail_container_labels_metrics_traefik_middleware_basic_auth_users>"
    - "old": "promtail_basic_auth_password"
      "new": "<superseded by promtail_container_labels_traefik_api_traefik_middleware_basic_auth_users or promtail_container_labels_metrics_traefik_middleware_basic_auth_users>"
    - "old": "promtail_container_label_basicauth_users"
      "new": "<superseded by promtail_container_labels_traefik_api_traefik_middleware_basic_auth_users or promtail_container_labels_metrics_traefik_middleware_basic_auth_users>"
    - { "old": "promtail_default_loki_client_enabled", "new": "<removed>" }
    - { "old": "promtail_default_loki_client", "new": "<removed>" }
    - { "old": "promtail_loki_server_url", "new": "<removed>" }
    - { "old": "promtail_config_scrape", "new": "promtail_config_scrape_configs" }
    - { "old": "promtail_config_scrape_additional", "new": "promtail_config_scrape_configs_custom" }
    - { "old": "promtail_config_scrape_varlog_default", "new": "promtail_varlog_scraper_config" }
    - { "old": "promtail_config_positions", "new": "<superseded by promtail_config_positions_filename and promtail_configuration_extension_yaml>" }
    - { "old": "promtail_target_config", "new": "<superseded by promtail_configuration_extension_yaml>" }
    - { "old": "promtail_config_options", "new": "<superseded by promtail_configuration_extension_yaml>" }
    - { "old": "promtail_config_limits", "new": "<superseded by promtail_configuration_extension_yaml>" }
    - { "old": "promtail_config_tracing", "new": "<superseded by promtail_configuration_extension_yaml>" }
    - { "old": "promtail_config_global", "new": "<superseded by promtail_configuration_extension_yaml>" }
    - { "old": "promtail_config_server", "new": "<superseded by promtail_configuration_extension_yaml>" }
    - { "old": "promtail_container_http_port", "new": "promtail_config_server_http_port" }
    - { "old": "promtail_container_grpc_port", "new": "promtail_config_server_grpc_port" }
    - { "old": "promtail_container_additionnal_bind_ports", "new": "<removed>" }
    - { "old": "promtail_tmpfs_size", "new": "<removed>" }
    - { "old": "promtail_container_labels_traefik_hostname", "new": "<removed>" }
    - { "old": "promtail_http_header_content_permission_policy", "new": "promtail_http_header_permissions_policy" }
    - { "old": "promtail_container_additional_mounts", "new": "promtail_container_additional_volumes" }
    - { "old": "promtail_container_additional_mounts_default", "new": "promtail_container_additional_volumes_default" }
    - { "old": "promtail_container_additional_mounts_auto", "new": "promtail_container_additional_volumes_auto" }
    - { "old": "promtail_container_additional_mounts_custom", "new": "promtail_container_additional_volumes_custom" }
    - { "old": "promtail_container_image_force_pull", "new": "<removed> (the new community.docker.docker_image_pull module handles this natively)" }

- name: (Deprecation) Catch and report renamed settings
  ansible.builtin.fail:
    msg: |-
      Please change your configuration file (vars.yml) to rename all `promtail_container_labels_api_`-prefixed variables (`promtail_container_labels_api_*` -> `promtail_container_labels_traefik_api_*`).

      The following variables in your configuration need to be renamed: {{ lookup('ansible.builtin.varnames', '^promtail_container_labels_api_.+', wantlist=True) | join(', ') }}
  when: "lookup('ansible.builtin.varnames', '^promtail_container_labels_api_.+', wantlist=True) | length > 0"

- name: Fail if required Promtail settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`).
  when: "lookup('vars', item, default='') | string | length == 0"
  with_items:
    - promtail_uid
    - promtail_gid
    - promtail_path_prefix
    - promtail_container_network

- name: Fail if no Promtail clients are defined
  ansible.builtin.fail:
    msg: >-
      You need to define at least one client (like Grafana Loki) where Promtail would push logs to.
      See `promtail_config_clients_custom`.
  when: "promtail_config_clients | length == 0"

- name: Run if Traefik is enabled
  when: promtail_container_labels_traefik_enabled | bool
  block:
    - name: Run if Traefik is enabled for Promtail API
      when: promtail_container_labels_traefik_api_enabled | bool
      block:
        - name: Fail if Traefik settings required for Promtail API are not defined
          ansible.builtin.fail:
            msg: >-
              You need to define a required configuration setting (`{{ item.name }}`).
          when: "item.when | bool and lookup('vars', item.name, default='') | string | length == 0"
          with_items:
            - { "name": "promtail_container_labels_traefik_api_hostname", when: true }
            - { "name": "promtail_container_labels_traefik_api_traefik_middleware_basic_auth_users", when: "{{ promtail_container_labels_traefik_api_traefik_middleware_basic_auth_enabled }}" }

    - name: Run if Traefik is enabled for Prometheus endpoint
      when: promtail_container_labels_metrics_enabled | bool
      block:
        - name: Fail if Traefik settings required for Promtail metrics endpoint are not defined
          ansible.builtin.fail:
            msg: >-
              You need to define a required configuration setting (`{{ item.name }}`).
          when: "item.when | bool and lookup('vars', item.name, default='') | string | length == 0"
          with_items:
            - { "name": "promtail_container_labels_metrics_hostname", when: true }
            - { "name": "promtail_container_labels_metrics_traefik_middleware_basic_auth_users", when: "{{ promtail_container_labels_metrics_traefik_middleware_basic_auth_enabled }}" }
